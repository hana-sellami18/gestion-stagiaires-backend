# ====================================================================
# CONFIGURATION COMMUNE (chargee dans tous les profils)
# ====================================================================

# Profil actif : dev par defaut, override par la variable d'environnement
# en prod (SPRING_PROFILES_ACTIVE=prod sera defini dans Docker)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Identite application
spring.application.name=gestion-stagiaires
server.port=8089
server.address=0.0.0.0

# ====================================================================
# UPLOAD FICHIERS (commun dev/prod)
# ====================================================================
file.upload-dir=${UPLOAD_DIR:uploads/cvs}
spring.web.resources.static-locations=file:${UPLOAD_DIR:uploads}/

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ====================================================================
# JWT (lit env var en prod, fallback en dev)
# ====================================================================
jwt.secret=${JWT_SECRET:7F3A9B2C1D8E4F6A0B5C3D7E9F2A4B6C8D0E2F4A6B8C0D2E4F6A8B0C2D4E6F8}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ====================================================================
# MAIL (lit env var en prod, fallback en dev)
# ====================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hanasellami18@gmail.com
spring.mail.password=lwzx sdll itfq kryt
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
