# ====================================================================
# ACTUATOR - Healthcheck pour Docker
# Reference : Guide Section 7 (Health Checks)
# ====================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Desactiver le check du serveur mail dans /actuator/health
# (Gmail SMTP est lent ~12s, ca polluait les logs et ralentissait le healthcheck)
management.health.mail.enabled=false