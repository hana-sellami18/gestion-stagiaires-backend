# ====================================================================
# PROFIL PROD : Configuration pour deploiement Docker
# Actif quand SPRING_PROFILES_ACTIVE=prod (defini dans docker-compose.yml)
# ====================================================================

# ===== Base de donnees MySQL dans Docker =====
# Hostname "mysql-db" = nom du service dans docker-compose.yml
# Docker cree un DNS interne qui resout ce nom vers l'IP du conteneur
spring.datasource.url=jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate en mode prod =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===== Logs prod (moins verbeux) =====
logging.level.root=INFO
logging.level.com.asm=INFO